<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>L'Oréal Beauty Assistant</title>

    <!-- Material icon used for the send button -->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />

    <!-- Montserrat font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <!-- Header / Branding -->
      <header class="site-header">
        <img src="img/loreal-logo.png" alt="L'Oréal logo" class="brand-logo" />

        <h1 class="site-title">L'Oréal Beauty Assistant</h1>

        <p class="site-subtitle">
          Discover products, routines, and personalized beauty recommendations.
        </p>
      </header>

      <!-- Chat Area -->
      <main>
        <section class="chatbox">
          <div id="chatWindow" class="chat-window">
            <!-- JavaScript displays messages here -->
          </div>

          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden">
              Enter your message
            </label>

            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Ask me about products or routines..."
              autocomplete="off"
              required
            />

            <button type="submit" id="sendBtn">
              <span class="material-icons">send</span>
              <span class="visually-hidden">Send</span>
            </button>
          </form>
        </section>
      </main>

      <!-- Footer -->
      <footer class="site-footer">
        <p>&copy; 2026 L'Oréal Beauty Assistant. Educational Project.</p>

        <nav>
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
